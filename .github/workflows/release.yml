name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || startsWith(github.event.head_commit.message, 'Release ')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          "version=$($package.version)" >> $env:GITHUB_OUTPUT
          "tag=v$($package.version)" >> $env:GITHUB_OUTPUT

      - name: Build installer
        run: npm run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Windowsill ${{ steps.package.outputs.tag }}
          tag_name: ${{ steps.package.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: |
            Windowsill ${{ steps.package.outputs.tag }}

            - Stabilized native file drag from the stash and AI attachments.
            - Added richer settings for AI provider, Base URL, API key, temperature, and hotkey.
            - Added Microsoft Store tool entry and UI polish for shortcut inputs.
          files: |
            release/Windowsill-Setup-*.exe
            release/Windowsill-Setup-*.exe.blockmap
            release/latest.yml
